<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Formation — Formation Manager</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Admin panel</p>
          <h1>Edit formation</h1>
        </div>
        <div class="header-actions">
          <a href="{{ url_for('home') }}" class="logout-btn">Back to catalog</a>
        </div>
      </header>

      <section class="creation-card detail-card">
        <form method="POST" class="creation-form">
          {% if message %}
            <div class="flash-message">{{ message }}</div>
          {% endif %}

          <div class="form-grid">
            <label>
              Title
              <input name="title" value="{{ formation.title }}" required />
            </label>
            <label>
              Category
              <input name="category" value="{{ formation.category }}" required />
            </label>
            <label>
              Duration
              <input name="duration" value="{{ formation.duration }}" required placeholder="e.g. 3 weeks" />
            </label>
            <label>
              Total seats
              <input name="total_seats" type="number" min="1" value="{{ formation.total_seats }}" required />
            </label>
          </div>

          <label>
            Description
            <textarea name="description" rows="6" required>{{ formation.description }}</textarea>
          </label>
          <button type="submit" class="button primary">Save changes</button>
        </form>
      </section>
    </div>
  </body>
</html>
