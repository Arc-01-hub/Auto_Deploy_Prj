version: '3.8'

services:
  app:
    build: .
    container_name: flask-app
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@mysql:3306/formations_db
      - SECRET_KEY=supersecret
      - FLASK_DEBUG=0

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: formations_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  volumes:
    mysql_data:
    
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql